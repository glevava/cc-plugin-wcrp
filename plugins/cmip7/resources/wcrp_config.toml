# ==============================================================================
# CMIP7 Configuration FILE
# ==============================================================================
# To be Consistent with https://zenodo.org/records/17250297
project_name = "cmip7"
project_version = "1.0"

# ======================================================================
# == Data Reference Syntax checks
# ======================================================================

[drs.filename]
# Check FILE001
severity = "H"

[drs.directory]
# Check PATH003
severity = "H"

[drs.consistency]
#  Checks PATH001 PATH002
severity = "H"

[file.format]
# Check FILE002
severity = "H"
expected_format = "HDF5"
expected_data_model = "NETCDF4_CLASSIC"

[file.compression]
# Check FILE003
severity = "H"
expected_complevel = 1
expected_shuffle = true

